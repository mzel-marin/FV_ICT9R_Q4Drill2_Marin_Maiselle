<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Index Checker</title>
    <style>
        body {
            background: linear-gradient(135deg, #000066, #ff3300, #ff9900);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.4);
        }
        h2 {
            text-align: center;
            color: #ffcc00;
            margin-top: 0;
        }
        .note {
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.6rem;
            border: none;
            border-radius: 4px;
            background: #e0e0e0;
            color: #000;
            text-align: center;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        button:hover {
            background: #ffdd33;
        }
        #result {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 4px;
            text-align: center;
            display: none;
        }
        .safe { background: #2ecc71; }
        .caution { background: #f39c12; }
        .danger { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Heat Index Checker</h2>
        <div class="note">
            <strong>▼ Note:</strong><br>
            Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.
        </div>

        <div class="form-group">
            <label>Degree in °C</label>
            <input type="number" id="temp" placeholder="Input degree value" min="0" max="50">
        </div>

        <div class="form-group">
            <label>humidity in %</label>
            <input type="number" id="humidity" placeholder="Input percentage value" min="0" max="100">
        </div>

        <button id="checkBtn">Check</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateHeatIndex(temp, rh) {
            if (temp < 27) return temp; 

            let hi = -8.784695 + 
                    1.611395411 * temp + 
                    2.338548838 * rh - 
                    0.14611605 * temp * rh - 
                    0.012308094 * temp**2 - 
                    0.016424828 * rh**2 + 
                    0.002211732 * temp**2 * rh + 
                    0.00072546 * temp * rh**2 - 
                    0.000003582 * temp**2 * rh**2;
            
            return Math.round(hi * 10) / 10;
        }

        function getStatus(hi) {
            if (hi < 32) return { text: "Safe", class: "safe" };
            if (hi < 40) return { text: "Caution: Fatigue possible", class: "caution" };
            if (hi < 51) return { text: "Danger: Heat cramps/exhaustion likely", class: "danger" };
            return { text: "Extreme Danger: Heat stroke imminent", class: "danger" };
        }

        document.getElementById("checkBtn").addEventListener("click", () => {
            const temp = parseFloat(document.getElementById("temp").value);
            const rh = parseFloat(document.getElementById("humidity").value);
            const resultEl = document.getElementById("result");

            if (isNaN(temp) || isNaN(rh) || temp < 0 || temp > 50 || rh < 0 || rh > 100) {
                resultEl.textContent = "⚠️ Please enter valid values: Temp 0–50°C, Humidity 0–100%";
                resultEl.className = "";
                resultEl.style.display = "block";
                return;
            }

            const heatIndex = calculateHeatIndex(temp, rh);
            const status = getStatus(heatIndex);

            resultEl.innerHTML = `
                <strong>Heat Index: ${heatIndex} °C</strong><br>
                Status: ${status.text}
            `;
            resultEl.className = status.class;
            resultEl.style.display = "block";
        });
    </script>
</body>
</html>
